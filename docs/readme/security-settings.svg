    <style>
      text { font-family: Inter, "Segoe UI", "Microsoft YaHei", Arial, sans-serif; }
      .title { fill:#0F172A; font-size:30px; font-weight:850; }
      .head { fill:#334155; font-size:18px; font-weight:820; }
      .muted { fill:#64748B; font-size:15px; }
      .num { fill:#0F172A; font-size:38px; font-weight:860; }
    </style>
  </defs>
  <rect width="1200" height="720" rx="32" fill="url(#bg)"/>
  <rect x="60" y="56" width="500" height="608" rx="28" fill="white" filter="url(#shadow)"/>
